services:
  bot:
    build: .
    container_name: personal_ai_assistant
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/usr/src/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/itopy.ai/apps:/opt/itopy.ai/apps
      - ./bot_ssh:/root/.ssh


